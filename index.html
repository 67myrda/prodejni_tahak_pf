function fromFB(v){
  if(!v)return null;
  if(v.stringValue!==undefined)return v.stringValue;
  if(v.integerValue!==undefined)return parseInt(v.integerValue);
  if(v.doubleValue!==undefined)return v.doubleValue;
  if(v.booleanValue!==undefined)return v.booleanValue;
  if(v.nullValue!==undefined)return null;
  if(v.mapValue){const o={};for(const k in(v.mapValue.fields||{}))o[k]=fromFB(v.mapValue.fields[k]);return o;}
  if(v.arrayValue)return(v.arrayValue.values||[]).map(fromFB);
  return null;
}
function toFB(v){
  if(v===null||v===undefined)return{nullValue:null};
  if(typeof v==="string")return{stringValue:v};
  if(typeof v==="boolean")return{booleanValue:v};
  if(typeof v==="number"){if(Number.isInteger(v))return{integerValue:String(v)};return{doubleValue:v};}
  if(Array.isArray(v))return{arrayValue:{values:v.map(toFB)}};
  if(typeof v==="object"){const f={};for(const k in v)if(Object.prototype.hasOwnProperty.call(v,k))f[k]=toFB(v[k]);return{mapValue:{fields:f}};}
  return{nullValue:null};
}
function docToObj(doc){
  if(!doc||!doc.fields)return null;
  const o={};for(const k in doc.fields)o[k]=fromFB(doc.fields[k]);
  return o;
}
async function restGet(path){
  try{
    const r=await fetch(`${FB_BASE}/${path}?key=${FB_KEY}`);
    if(r.status===404)return null;
    if(!r.ok)throw new Error("HTTP "+r.status);
    return docToObj(await r.json());
  }catch(e){console.warn("restGet",path,e.message);return null;}
}
async function restPatch(path,data){
  try{
    const fields={};
    for(const k in data)if(Object.prototype.hasOwnProperty.call(data,k))fields[k]=toFB(data[k]);
    const keys=Object.keys(data);
    const mask=keys.map(k=>"updateMask.fieldPaths="+encodeURIComponent(k)).join("&");
    const url=`${FB_BASE}/${path}?key=${FB_KEY}&${mask}`;
    const r=await fetch(url,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({fields})});
    if(!r.ok){const e=await r.json();throw new Error(JSON.stringify(e.error||e));}
    return true;
  }catch(e){console.error("restPatch",path,e.message);return false;}
}
async function restGetCol(col){
  try{
    const r=await fetch(`${FB_BASE}/${col}?key=${FB_KEY}`);
    if(!r.ok)return[];
    const j=await r.json();
    return(j.documents||[]).map(docToObj).filter(Boolean);
  }catch(e){console.warn("restGetCol",col,e.message);return[];}
}
async function restSetDoc(path,data){
  try{
    const fields={};
    for(const k in data)if(Object.prototype.hasOwnProperty.call(data,k))fields[k]=toFB(data[k]);
    const r=await fetch(`${FB_BASE}/${path}?key=${FB_KEY}`,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({fields})});
    return r.ok;
  }catch(e){console.error("restSetDoc",path,e.message);return false;}
}
async function restDelDoc(path){
  try{await fetch(`${FB_BASE}/${path}?key=${FB_KEY}`,{method:"DELETE"});return true;}
  catch(e){return false;}
}

const IDB={

  async init(){if(this.db)return;await new Promise((res,rej)=>{const r=indexedDB.open("PFFiles",1);r.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains("f"))d.createObjectStore("f",{keyPath:"k"});};r.onsuccess=e=>{this.db=e.target.result;res();};r.onerror=()=>rej(r.error);});},
  async get(k){await this.init();return new Promise(r=>{const t=this.db.transaction("f","readonly");const q=t.objectStore("f").get(k);q.onsuccess=()=>r(q.result?q.result.v:null);q.onerror=()=>r(null);});},

  async del(k){await this.init();return new Promise(r=>{const t=this.db.transaction("f","readwrite");t.objectStore("f").delete(k);t.oncomplete=()=>r();t.onerror=()=>r();});}

// České státní svátky (pevná data + Velikonoční pondělí spočtené algoritmem)
function easterMonday(y){
  const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),month=Math.floor((h+l-7*m+114)/31),day=((h+l-7*m+114)%31)+1;
  const sunday=new Date(y,month-1,day);
  return new Date(y,sunday.getMonth(),sunday.getDate()+1);
}
function isCzechHoliday(date){
  const y=date.getFullYear(),md=(date.getMonth()+1)+"-"+date.getDate();
  const fixed=["1-1","5-1","5-8","7-5","7-6","9-28","10-28","11-17","12-24","12-25","12-26"];
  if(fixed.includes(md))return true;
  const em=easterMonday(y);
  return date.getFullYear()===em.getFullYear()&&date.getMonth()===em.getMonth()&&date.getDate()===em.getDate();
}
function countWorkDays(startStr,endStr){
  if(!startStr||!endStr)return 0;
  const start=new Date(startStr),end=new Date(endStr);
  if(isNaN(start)||isNaN(end)||end<start)return 0;
  let count=0;
  for(let d=new Date(start);d<=end;d.setDate(d.getDate()+1)){
    const dow=d.getDay();
    if(dow!==0&&dow!==6&&!isCzechHoliday(d))count++;
  }
  return count;
}

  return(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:500,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}><div style={{background:"white",borderRadius:"20px 20px 0 0",width:"100%",maxWidth:680,maxHeight:"92vh",display:"flex",flexDirection:"column",boxShadow:"0 -8px 40px rgba(0,0,0,0.2)"}}><div style={{padding:"13px 17px",borderBottom:"1px solid #f0f0f0",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}><div style={{fontWeight:800,fontSize:14,color:DK,flex:1}}>{title}</div>{extraHeader&&<div style={{marginRight:6}}>{extraHeader}</div>}<button onClick={onClose} style={{background:"#f5f5f5",border:"none",width:28,height:28,borderRadius:"50%",cursor:"pointer",fontSize:15,color:"#888",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button></div><div style={{flex:1,overflowY:"auto",padding:"13px 17px"}}>{children}</div>{onSave&&<div style={{padding:"11px 17px",borderTop:"1px solid #f0f0f0",display:"flex",gap:8,flexShrink:0}}><button onClick={onClose} style={{flex:1,padding:11,background:"#f5f5f5",border:"none",borderRadius:10,fontWeight:600,fontSize:13,cursor:"pointer",color:"#666"}}>Zrušit</button><button onClick={onSave} style={{flex:2,padding:11,background:OR,color:"white",border:"none",borderRadius:10,fontWeight:700,fontSize:13,cursor:"pointer"}}>💾 Uložit</button></div>}</div></div>);
}
function FileUploadBox({idbKey,maxFiles,maxMB,accept,label,emptyText}){
  const [files,setFiles]=useState([]);const [status,setStatus]=useState("");const [preview,setPreview]=useState(null);const [rdy,setRdy]=useState(false);
  useEffect(()=>{IDB.get(idbKey).then(d=>{setFiles(d||[]);setRdy(true);});},[idbKey]);
  async function save(f){setFiles(f);await IDB.set(idbKey,f);}
  function handleFile(e){
    const f=e.target.files[0];if(!f)return;
    if(files.length>=maxFiles){setStatus(`❌ Max. ${maxFiles} souborů.`);setTimeout(()=>setStatus(""),3000);return;}
    if(f.size>maxMB*1024*1024){setStatus(`❌ Soubor je větší než ${maxMB} MB.`);setTimeout(()=>setStatus(""),3000);return;}
    setStatus("⏳ Načítám...");
    const r=new FileReader();
    r.onload=async ev=>{try{const nf={id:Date.now(),name:f.name,type:f.type,size:f.size,data:ev.target.result,uploadedAt:new Date().toISOString()};await save([...files,nf]);setStatus("✅ Uloženo!");}catch(err){setStatus("❌ Chyba – soubor příliš velký?");}setTimeout(()=>setStatus(""),2000);e.target.value="";};
    r.onerror=()=>{setStatus("❌ Chyba při čtení.");e.target.value="";};
    r.readAsDataURL(f);
  }
  async function del(id){if(!window.confirm("Smazat soubor?"))return;await save(files.filter(f=>f.id!==id));}
  function fmt(b){if(b<1048576)return(b/1024).toFixed(0)+"KB";return(b/1048576).toFixed(1)+"MB";}
  if(!rdy)return<div style={{textAlign:"center",color:"#ccc",padding:20,fontSize:12}}>Načítám...</div>;
  return(<div>{files.length<maxFiles&&(<div style={{marginBottom:12}}><label style={{display:"block",width:"100%",padding:"11px 0",background:status.startsWith("⏳")?"#ccc":OR,color:"white",borderRadius:10,fontWeight:700,fontSize:13,cursor:"pointer",textAlign:"center",boxSizing:"border-box",marginBottom:status?8:0}}>{label}<input type="file" accept={accept} style={{display:"none"}} onChange={handleFile} disabled={status.startsWith("⏳")}/></label>{status&&<div style={{padding:"8px 12px",borderRadius:8,background:status.startsWith("✅")?"#f0fdf4":status.startsWith("⏳")?"#fff8f0":"#fef2f2",color:status.startsWith("✅")?"#16a34a":status.startsWith("⏳")?OR:"#dc2626",fontSize:12,fontWeight:600}}>{status}</div>}</div>)}{files.length>=maxFiles&&<div style={{background:"#f0fdf4",border:"1px solid #86efac",borderRadius:9,padding:10,marginBottom:12,fontSize:12,color:"#166534",textAlign:"center"}}>✅ Plný ({maxFiles}/{maxFiles})</div>}{files.length===0&&<div style={{textAlign:"center",padding:"20px 0",color:"#ccc"}}><div style={{fontSize:32,marginBottom:6}}>📂</div><div style={{fontSize:12}}>{emptyText}</div></div>}{files.map(f=>(<div key={f.id} style={{background:"white",borderRadius:10,padding:11,marginBottom:8,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",display:"flex",alignItems:"center",gap:9}}><div style={{fontSize:22,flexShrink:0}}>{f.type?.includes("pdf")?"📄":f.type?.includes("image")?"🖼️":"📎"}</div><div style={{flex:1,minWidth:0}}><div style={{fontWeight:600,color:DK,fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.name}</div><div style={{fontSize:10,color:"#ccc",marginTop:1}}>{fmt(f.size)} · {new Date(f.uploadedAt).toLocaleDateString("cs")}</div></div><div style={{display:"flex",gap:4,flexShrink:0}}><button onClick={()=>setPreview(f)} style={{background:"#eff6ff",border:"none",color:"#2563eb",padding:"5px 7px",borderRadius:6,fontSize:12,cursor:"pointer"}}>👁️</button><a href={f.data} download={f.name} style={{background:"#f0fdf4",color:"#16a34a",padding:"5px 7px",borderRadius:6,fontSize:12,textDecoration:"none"}}>⬇️</a><button onClick={()=>del(f.id)} style={{background:"#fef2f2",border:"none",color:"#dc2626",padding:"5px 7px",borderRadius:6,fontSize:12,cursor:"pointer"}}>✕</button></div></div>))}{preview&&(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.93)",zIndex:2000,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:14}}><div style={{width:"100%",maxWidth:600}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><div style={{color:"white",fontSize:13,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{preview.name}</div><button onClick={()=>setPreview(null)} style={{background:"rgba(255,255,255,0.15)",border:"none",color:"white",padding:"6px 12px",borderRadius:7,cursor:"pointer",flexShrink:0,marginLeft:8}}>✕ Zavřít</button></div>{preview.type?.includes("pdf")?<iframe src={preview.data} style={{width:"100%",height:"78vh",borderRadius:8,border:"none"}} title={preview.name}/>:<img src={preview.data} alt={preview.name} style={{maxWidth:"100%",maxHeight:"80vh",objectFit:"contain",borderRadius:8,display:"block",margin:"0 auto"}}/>}</div></div>)}</div>);
}
// ── ROOT ──────────────────────────────────────────────────────
function App(){
  const [phase,setPhase]=useState("loading");
  const [me,setMe]=useState(null);
  const [users,setUsers]=useState([]);
  const [cfg,setCfg]=useState({accessCode:DEF_CODE,adminPassword:DEF_APW});
  const [showBack,setShowBack]=useState(false);
  const [syncStatus,setSyncStatus]=useState("ok");
  useEffect(()=>{
    IDB.init().catch(console.warn);
    Promise.all([restGetCol("pf_users"),restGet("pf_config/main")]).then(([us,c])=>{
      const ul=us||[];
      const cl=c||{accessCode:DEF_CODE,adminPassword:DEF_APW};
      setUsers(ul);setCfg(cl);
      const ses=lsGet("pf_session");
      if(ses?.userId){
        if(ses.userId==="admin"){setMe({id:"admin",name:"Admin",role:"admin"});setPhase("main");return;}
        const f=ul.find(x=>x.id===ses.userId);
        if(f){setMe(f);setPhase("main");return;}
      }
      setPhase("auth");
    }).catch(()=>{
      const ses=lsGet("pf_session");
      if(ses?.userId==="admin"){setMe({id:"admin",name:"Admin",role:"admin"});setPhase("main");}
      else setPhase("auth");
    });
  },[]);
  useEffect(()=>{if(phase!=="main")return;history.pushState({app:true},"");const h=()=>setShowBack(true);window.addEventListener("popstate",h);return()=>window.removeEventListener("popstate",h);},[phase]);
  function stayInApp(){history.pushState({app:true},"");setShowBack(false);}
  function leaveApp(){window.history.go(-2);}
  async function login(u){setMe(u);lsSet("pf_session",{userId:u.id});setPhase("main");}
  async function logout(){lsSet("pf_session",null);setMe(null);setPhase("auth");}
  async function upUsers(nu){
    setUsers(nu);
    // Delete removed, upsert all
    const existing=await restGetCol("pf_users");
    for(const u of existing){if(!nu.find(x=>x.id===u.id))await restDelDoc("pf_users/"+u.id);}
    for(const u of nu)await restSetDoc("pf_users/"+u.id,u);
  }
  async function upCfg(nc){setCfg(nc);await restSetDoc("pf_config/main",nc);}
  if(phase==="loading")return(<div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:BG}}><div style={{textAlign:"center"}}><img src={LOGO} alt="PF" style={{width:64,height:64,objectFit:"contain",display:"block",margin:"0 auto 14px"}}/><div style={{color:OR,fontWeight:800,fontSize:18}}>Prodejní Tahák</div><div style={{color:"#bbb",marginTop:8,fontSize:13}}>⏳ Načítám...</div></div></div>);
  if(phase==="auth")return<Auth users={users} cfg={cfg} onLogin={login} upUsers={upUsers}/>;
  return(<>{showBack&&<BackDialog onStay={stayInApp} onLeave={leaveApp}/>}<Shell me={me} users={users} cfg={cfg} syncStatus={syncStatus} setSyncStatus={setSyncStatus} onLogout={logout} upUsers={upUsers} upCfg={upCfg}/></>);
}

// ── AUTH ──────────────────────────────────────────────────────
function Auth({users,cfg,onLogin,upUsers}){
  const [mode,setMode]=useState("login");
  const [name,setName]=useState("");const [pw,setPw]=useState("");
  const [code,setCode]=useState("");const [np,setNp]=useState("");const [cp,setCp]=useState("");
  const [err,setErr]=useState("");const [show,setShow]=useState(false);
  const aPw=cfg?.adminPassword||DEF_APW;const aC=cfg?.accessCode||DEF_CODE;
  function doLogin(){setErr("");if(name.trim().toLowerCase()==="admin"&&pw===aPw){onLogin({id:"admin",name:"Admin",role:"admin"});return;}const f=users.find(u=>u.name.toLowerCase()===name.trim().toLowerCase()&&u.password===pw);f?onLogin(f):setErr("Nesprávné jméno nebo heslo.");}
  async function doReg(){setErr("");if(code.trim()!==aC){setErr("Nesprávný přístupový kód.");return;}if(!name.trim()){setErr("Zadej své jméno.");return;}if(np.length<4){setErr("Heslo musí mít alespoň 4 znaky.");return;}if(np!==cp){setErr("Hesla se neshodují.");return;}if(users.find(u=>u.name.toLowerCase()===name.trim().toLowerCase())){setErr("Uživatel s tímto jménem již existuje.");return;}const nu={id:Date.now().toString(),name:name.trim(),password:np,role:"user",createdAt:new Date().toISOString()};await upUsers([...users,nu]);onLogin(nu);}
  return(<div style={{minHeight:"100vh",background:`linear-gradient(160deg,${DK} 0%,#2a1200 100%)`,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}><div style={{width:"100%",maxWidth:400}}><div style={{textAlign:"center",marginBottom:22}}><img src={LOGO} alt="PF" style={{width:80,height:80,objectFit:"contain",display:"block",margin:"0 auto 10px"}}/><div style={{color:"rgba(255,255,255,0.5)",fontSize:12}}>Prodejní Tahák · Kulturní plakáty</div></div><div style={{background:"white",borderRadius:20,padding:22,boxShadow:"0 20px 60px rgba(0,0,0,0.4)"}}><div style={{display:"flex",marginBottom:18,background:"#f5f5f5",borderRadius:10,padding:4}}>{[["login","Přihlásit se"],["register","Nový uživatel"]].map(([m,l])=>(<button key={m} onClick={()=>{setMode(m);setErr("");}} style={{flex:1,padding:"8px 0",borderRadius:8,border:"none",background:mode===m?OR:"transparent",color:mode===m?"white":"#666",fontWeight:600,fontSize:13,cursor:"pointer"}}>{l}</button>))}</div>{err&&<div style={{background:"#fef2f2",border:"1px solid #fca5a5",color:"#dc2626",borderRadius:8,padding:"9px 13px",marginBottom:13,fontSize:13}}>⚠️ {err}</div>}{mode==="login"?(<div><div style={{marginBottom:12}}><label style={lbl}>Jméno</label><input style={inp} value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doLogin()} placeholder="Vaše jméno nebo: admin"/></div><div style={{marginBottom:20}}><label style={lbl}>Heslo</label><div style={{position:"relative"}}><input style={{...inp,paddingRight:42}} type={show?"text":"password"} value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doLogin()} placeholder="••••••"/><button onClick={()=>setShow(s=>!s)} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:16}}>{show?"🙈":"👁️"}</button></div></div><button onClick={doLogin} style={{width:"100%",padding:14,background:OR,color:"white",border:"none",borderRadius:12,fontWeight:700,fontSize:16,cursor:"pointer"}}>Přihlásit se →</button></div>):(<div><div style={{marginBottom:10}}><label style={lbl}>Přístupový kód</label><input style={inp} value={code} onChange={e=>setCode(e.target.value)}/></div><div style={{marginBottom:10}}><label style={lbl}>Vaše jméno</label><input style={inp} value={name} onChange={e=>setName(e.target.value)}/></div><div style={{marginBottom:10}}><label style={lbl}>Heslo (min. 4 znaky)</label><input style={inp} type="password" value={np} onChange={e=>setNp(e.target.value)}/></div><div style={{marginBottom:18}}><label style={lbl}>Potvrzení hesla</label><input style={inp} type="password" value={cp} onChange={e=>setCp(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doReg()}/></div><button onClick={doReg} style={{width:"100%",padding:14,background:GR,color:"white",border:"none",borderRadius:12,fontWeight:700,fontSize:16,cursor:"pointer"}}>Vytvořit účet →</button></div>)}</div><div style={{textAlign:"center",color:"rgba(255,255,255,0.25)",fontSize:11,marginTop:12}}>Pro-Factor s.r.o. | kulturavemeste.cz</div></div></div>);
}

// ── SHELL ─────────────────────────────────────────────────────
function Shell({me,users,cfg,syncStatus,setSyncStatus,onLogout,upUsers,upCfg}){
  const [tab,setTab]=useState("dashboard");
  const uid=me.id;
  const [city,setCity]=useState(null);const [qb,setQb]=useState(null);const [prices,setPrices]=useState(null);
  const [texts,setTexts]=useState(null);const [args,setArgs]=useState(null);const [metrics,setMetrics]=useState(null);
  const [objs,setObjs]=useState(null);const [rows,setRows]=useState(null);const [camp,setCamp]=useState(null);
  const [intro,setIntro]=useState(null);const [csize,setCsize]=useState(null);const [rdy,setRdy]=useState(false);
  const [cityImgs,setCityImgs]=useState({posterImg:null,leafletImg:null});

  async function loadData(){
    const data=await restGet("pf_userdata/"+uid);
    Promise.all([IDB.get("cityimg_"+uid+"_poster"),IDB.get("cityimg_"+uid+"_leaflet")]).then(([p,l])=>setCityImgs({posterImg:p,leafletImg:l}));
    if(!data){
      setCity({name:"Vaše město",emoji:"🏙️"});setQb(DEF_QB);setPrices(DEF_PRICES);setTexts(DEF_SCRIPTS);
      setArgs(DEF_ARGS);setMetrics(DEF_METRICS);setObjs(DEF_OBJS);setRows(mkRows());
      setCamp({startDate:"",endDate:"",marginPct:20,notes:"",summary:""});setIntro(DEF_INTRO);setCsize({sizeA1:"",sizeA2:"",price:""});
    }else{
      if(data.city)setCity(data.city);else setCity({name:"Vaše město",emoji:"🏙️"});
      if(data.qb&&data.qbVersion===QB_VERSION){setQb(data.qb);}else{setQb(DEF_QB);restPatch("pf_userdata/"+uid,{qb:DEF_QB,qbVersion:QB_VERSION});}
      if(data.prices)setPrices(data.prices);else setPrices(DEF_PRICES);
      if(data.texts)setTexts(data.texts);else setTexts(DEF_SCRIPTS);
      if(data.args)setArgs(data.args);else setArgs(DEF_ARGS);
      if(data.metrics)setMetrics(data.metrics);else setMetrics(DEF_METRICS);
      if(data.objs)setObjs(data.objs);else setObjs(DEF_OBJS);
      if(data.rows)setRows(migrateRows(data.rows));else setRows(mkRows());
      if(data.camp)setCamp(data.camp);else setCamp({startDate:"",endDate:"",marginPct:20,notes:"",summary:""});
      setIntro(data.intro!==undefined?data.intro:DEF_INTRO);
      if(data.csize)setCsize(data.csize);else setCsize({sizeA1:"",sizeA2:"",price:""});
    }
    setRdy(true);
  }

  useEffect(()=>{loadData();},[uid]);

  // Poll for changes every 30 seconds (multi-device sync)
  useEffect(()=>{
    if(!rdy)return;
    const interval=setInterval(async()=>{
      const data=await restGet("pf_userdata/"+uid);
      if(!data)return;
      if(data.city)setCity(data.city);if(data.qb)setQb(data.qb);if(data.prices)setPrices(data.prices);
      if(data.texts)setTexts(data.texts);if(data.args)setArgs(data.args);if(data.metrics)setMetrics(data.metrics);
      if(data.objs)setObjs(data.objs);if(data.rows)setRows(data.rows);if(data.camp)setCamp(data.camp);
      if(data.intro!==undefined)setIntro(data.intro);if(data.csize)setCsize(data.csize);
    },30000);
    return()=>clearInterval(interval);
  },[uid,rdy]);

  async function sv(field,value){
    // Update local state immediately
    const setters={city:setCity,qb:setQb,prices:setPrices,texts:setTexts,args:setArgs,metrics:setMetrics,objs:setObjs,rows:setRows,camp:setCamp,intro:setIntro,csize:setCsize};
    if(setters[field])setters[field](value);
    // Save to Firestore
    setSyncStatus("saving");
    const ok=await restPatch("pf_userdata/"+uid,{[field]:value});
    setSyncStatus(ok?"ok":"err");
  }

  function saveCity(cityData){
    const{posterImg,leafletImg,...cityText}=cityData;
    sv("city",cityText);
    if(posterImg!==undefined){setCityImgs(p=>({...p,posterImg}));if(posterImg)IDB.set("cityimg_"+uid+"_poster",posterImg);else IDB.del("cityimg_"+uid+"_poster");}
    if(leafletImg!==undefined){setCityImgs(p=>({...p,leafletImg}));if(leafletImg)IDB.set("cityimg_"+uid+"_leaflet",leafletImg);else IDB.del("cityimg_"+uid+"_leaflet");}
  }

  const cityFull=city?{...city,...cityImgs}:null;
  function nav(t){
    if(t==="web"){window.open("https://www.kulturavemeste.cz","_blank");return;}
    if(t==="disc_google"){window.open("https://drive.google.com/drive/folders/1IwM0Grensjt_dfbX8Vb5pKcMbbj8GE3s","_blank");return;}
    if(t==="predesla_mesta"){window.alert("🏙️ Archiv Předešlá města se připravuje – čeká na dokončení redesignu záložky Shrnutí.");return;}
    if(t==="vizitka"){setTab("vizitka");return;}
    if(t==="vizitka_table"){setTab("vizitka");setTimeout(()=>document.getElementById("vizitka_table")?.scrollIntoView({behavior:"smooth",block:"start"}),200);return;}
    if(["prezentace","namitky","phone_new","phone_existing","email_new","email_consult","scenar","kalkulacka"].includes(t)){setTab("prezentace");setTimeout(()=>document.getElementById("s_"+t)?.scrollIntoView({behavior:"smooth",block:"start"}),200);return;}
    setTab(t);
  }
  const totalRev=rows?rows.reduce((s,r)=>s+(parseFloat(r.price)||0),0):0;
  const tabs=[{id:"dashboard",icon:"🏠",label:"Přehled"},{id:"prezentace",icon:"📋",label:"Prezentace"},{id:"vizitka",icon:"📍",label:"Vizitka"},{id:"soubory",icon:"📁",label:"Soubory"},me.role==="admin"?{id:"admin",icon:"⚙️",label:"Admin"}:{id:"nastaveni",icon:"⚙️",label:"Nastavení"}];
  if(!rdy||!city||!qb||!rows)return(<div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:BG}}><div style={{textAlign:"center"}}><div style={{color:OR,fontWeight:600,fontSize:15}}>⏳ Načítám data...</div><div style={{color:"#bbb",fontSize:12,marginTop:8}}>Připojuji se k databázi...</div></div></div>);
  return(<div style={{minHeight:"100vh",background:BG,maxWidth:680,margin:"0 auto"}}>
    <header style={{background:`linear-gradient(135deg,${DK},#2a1200)`,padding:"8px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 10px rgba(0,0,0,0.3)"}}>
      <div style={{display:"flex",alignItems:"center",gap:9}}>
        <img src={LOGO} alt="PF" style={{width:32,height:32,objectFit:"contain",flexShrink:0}}/>
        <div><div style={{fontSize:11,lineHeight:1.2}}><span style={{color:OR,fontWeight:700}}>Prodejní Tahák</span><span style={{color:"rgba(255,255,255,0.5)",fontWeight:400}}> | © tahax67</span><SyncDot status={syncStatus}/></div><div style={{color:"rgba(255,255,255,0.35)",fontSize:9}}>Pro-Factor · kulturavemeste.cz</div></div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{color:"rgba(255,255,255,0.75)",fontSize:11}}>{me.name}</span><button onClick={onLogout} style={{background:"rgba(255,255,255,0.1)",border:"none",color:"rgba(255,255,255,0.6)",padding:"4px 9px",borderRadius:7,fontSize:10,cursor:"pointer"}}>Odhlásit</button></div>
    </header>
    <main style={{paddingBottom:70}}>
      {tab==="dashboard"&&cityFull&&qb&&intro!==null&&<Dashboard city={cityFull} qb={qb} intro={intro} onNav={nav} saveCity={saveCity} sv={sv}/>}
      {tab==="prezentace"&&texts&&args&&<Prezentace texts={texts} args={args} metrics={metrics} objs={objs} prices={prices} csize={csize} sv={sv}/>}

// ── POSTER GRID ─────────────────────────────────────────────
function PosterGrid({rows,onToggle,onEdit,posterImg,onSavePosterImg}){
  const [imgSt,setImgSt]=useState("");
  function getR(lbl){return rows.find(r=>r.label===lbl);}
  function Tile({lbl,horiz}){
    const r=getR(lbl);
    const t=r&&TYPES[r.type];
    const bg=t?t.bg:"#f5f5f5";
    const col=t?t.color:"#ccc";
    const bord=r&&r.type==="V"?"1px solid #d1d5db":"none";
    const words=r?(r.advertiser||"").trim().split(/\s+/).slice(0,2).join(" "):"";
    if(horiz){return(
      <div onClick={()=>r&&onEdit(lbl)} style={{background:bg,border:bord,borderRadius:3,padding:"3px 6px",cursor:r?"pointer":"default",display:"flex",alignItems:"center",gap:4,minHeight:18}}>
        <span style={{fontSize:7,color:col,fontWeight:700,opacity:0.6,flexShrink:0}}>{lbl}</span>
        {words&&<span style={{fontSize:9,color:col,fontWeight:600,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{words}</span>}
        {r&&<span onClick={e=>{e.stopPropagation();onToggle(lbl);}} style={{fontSize:10,cursor:"pointer",flexShrink:0}}>{GFX_META[r.gfxStatus||"red"].icon}</span>}
      </div>
    );}
    return(
      <div onClick={()=>r&&onEdit(lbl)} style={{flex:1,background:bg,border:bord,borderRadius:3,padding:"3px 4px",cursor:r?"pointer":"default",position:"relative",overflow:"hidden",minHeight:26,display:"flex",flexDirection:"column",justifyContent:"space-between"}}>
        <div style={{fontSize:7,color:col,fontWeight:700,opacity:0.55,lineHeight:1}}>{lbl}</div>
        {words&&<div style={{fontSize:9,color:col,fontWeight:600,lineHeight:1.25,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:3,WebkitBoxOrient:"vertical",paddingRight:12}}>{words}</div>}
        {r&&<div onClick={e=>{e.stopPropagation();onToggle(lbl);}} style={{position:"absolute",top:2,right:2,fontSize:10,lineHeight:1,cursor:"pointer"}}>{GFX_META[r.gfxStatus||"red"].icon}</div>}
      </div>
    );
  }
  function readImg(file){
    if(!file)return;
    if(file.size>5*1024*1024){setImgSt("❌");setTimeout(()=>setImgSt(""),3000);return;}
    setImgSt("⏳");
    const rd=new FileReader();
    rd.onload=ev=>{onSavePosterImg(ev.target.result);setImgSt("✅");setTimeout(()=>setImgSt(""),2000);};
    rd.onerror=()=>setImgSt("❌");
    rd.readAsDataURL(file);
  }
  const btmPairs=[["12","13"],["14a","14b"],["15a","15b"],["16","17"]];
  return(
    <div style={{background:"white",borderRadius:12,padding:10,marginBottom:12,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
      <div style={{fontWeight:700,fontSize:12,color:DK,marginBottom:8}}>📋 Rozvržení plakátu <span style={{color:"#bbb",fontWeight:400,fontSize:10}}>· klepni 🟡/🟢 pro přepnutí grafiky</span></div>
      <div className="poster-main-grid" style={{display:"grid",gridTemplateColumns:"1fr 2.5fr 1fr",gap:2,marginBottom:2,alignItems:"stretch"}}>
        <div className="poster-side-col">
          {POSTER_LEFT.map(l=><Tile key={l} lbl={l}/>)}
        </div>
        <div className="poster-ctr-col">
          <div className="poster-ctr" style={{borderRadius:4,overflow:"hidden",position:"relative",background:"#f5f3ef"}}>
            {posterImg
              ?<img src={posterImg} alt="Plakát" style={{width:"100%",height:"100%",objectFit:"contain",display:"block"}}/>
              :<div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center"}}>
                <div style={{textAlign:"center"}}><div style={{color:"#d1c8bc",fontSize:10,fontWeight:700,letterSpacing:1,textTransform:"uppercase"}}>Kulturní</div><div style={{color:"#d1c8bc",fontSize:10,fontWeight:700,letterSpacing:1,textTransform:"uppercase"}}>plakát</div></div>
              </div>
            }
            <label style={{position:"absolute",bottom:4,right:4,background:"rgba(0,0,0,0.45)",color:"white",borderRadius:5,padding:"2px 7px",fontSize:9,cursor:"pointer",lineHeight:1.4}}>
              {imgSt||"📷"}<input type="file" accept="image/*" style={{display:"none"}} onChange={e=>{readImg(e.target.files[0]);e.target.value="";}}/>
            </label>
            {posterImg&&<button onClick={()=>onSavePosterImg(null)} style={{position:"absolute",top:3,right:3,background:"rgba(0,0,0,0.45)",border:"none",color:"white",borderRadius:4,padding:"1px 5px",fontSize:10,cursor:"pointer",lineHeight:1.4}}>✕</button>}
          </div>
          <div className="strip29-center"><Tile lbl="29" horiz={true}/></div>
        </div>
        <div className="poster-side-col">
          {POSTER_RIGHT.map(l=><Tile key={l} lbl={l}/>)}
        </div>
      </div>
      <div className="poster-btm-grid" style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:2}}>
        {btmPairs.map(([a,b])=>(<div key={a+b} style={{display:"flex",flexDirection:"column",gap:2}}><Tile lbl={a}/><Tile lbl={b}/></div>))}
      </div>
    </div>
  );
}

  },[uid]);
  function autoLabel(n){if(labels[n])return labels[n];const row=rows.find(r=>r.id===n);if(row?.advertiser){const s=row.advertiser.split("\n")[0].trim();return s.length>16?s.slice(0,15)+"…":s;}return null;}
  async function saveLabels(l){setLabels(l);await restSetDoc("pf_slotlabels/"+uid,l);}
  return(<div style={{padding:"16px"}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:13}}><h2 style={{margin:0,fontSize:17,fontWeight:900,color:DK}}>📁 Soubory <span style={{color:OR}}>klientů</span></h2>{openSlot&&<button onClick={()=>setOpenSlot(null)} style={{background:"#f5f5f5",border:"none",color:"#666",padding:"6px 12px",borderRadius:9,fontWeight:600,fontSize:12,cursor:"pointer"}}>← Zpět</button>}</div>
    {!openSlot?(<>
      <div style={{background:"#fffbf0",border:`1.5px solid ${OR}30`,borderRadius:10,padding:11,marginBottom:14,fontSize:11.5,color:"#888",lineHeight:1.5}}>💡 Soubory jsou uloženy lokálně v zařízení. Slot # = řádek klienta v Prodaných místech.</div>
      {!labelsRdy?<div style={{textAlign:"center",color:"#ccc",padding:30}}>Načítám...</div>:(<div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:5,marginBottom:20}}>{Array.from({length:30},(_,i)=>{const n=i+1;const cnt=slotCounts[n]||0;const al=autoLabel(n);return(<div key={n} style={{position:"relative"}}><button onClick={()=>setOpenSlot(n)} style={{width:"100%",background:cnt>0?"#fff8f0":"white",border:cnt>0?`2px solid ${OR}40`:"1.5px solid #e5e7eb",borderRadius:9,padding:"7px 3px 5px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:1}}><span style={{fontSize:10,fontWeight:800,color:cnt>0?OR:DK}}>#{n}</span>{al&&<span style={{fontSize:7,color:"#777",lineHeight:1.2,textAlign:"center",wordBreak:"break-word",maxWidth:"100%",padding:"0 2px"}}>{al}</span>}{cnt>0?<span style={{background:cnt>=4?GR:OR,color:"white",fontSize:8,fontWeight:700,padding:"1px 4px",borderRadius:3,marginTop:1}}>{cnt}/4</span>:<span style={{fontSize:12,opacity:0.2}}>📄</span>}</button><button onClick={e=>{e.stopPropagation();setEditLabel(n);setLabelTmp(labels[n]||"");}} style={{position:"absolute",top:2,right:2,background:"none",border:"none",fontSize:8,cursor:"pointer",color:"#bbb",padding:0,lineHeight:1}}>✏️</button></div>);})}</div>)}
      <div style={{background:"#f0f9ff",border:"2px solid #bae6fd",borderRadius:14,padding:14}}><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}><span style={{fontSize:20}}>🗂️</span><div><div style={{fontWeight:800,fontSize:14,color:"#0369a1"}}>Obecné úložiště</div><div style={{fontSize:11,color:"#7dd3fc"}}>Soubory bez vazby na klienta · max 10 souborů · 10 MB / soubor</div></div></div><FileUploadBox idbKey={"general_"+uid} maxFiles={10} maxMB={10} accept="image/*,application/pdf" label="📤 Přidat soubor (PDF nebo obrázek)" emptyText="Obecné úložiště je prázdné"/></div>
      {editLabel!==null&&<Modal title={"Označit slot #"+editLabel} onClose={()=>setEditLabel(null)} onSave={async()=>{const l={...labels};if(labelTmp.trim())l[editLabel]=labelTmp.trim();else delete l[editLabel];await saveLabels(l);setEditLabel(null);}}><div style={{marginBottom:8,fontSize:12,color:"#888"}}>Vlastní popis (prázdné = auto z Vizitky)</div><input style={inp} value={labelTmp} onChange={e=>setLabelTmp(e.target.value)} placeholder="Název firmy..."/></Modal>}
    </>):(<div><div style={{background:`linear-gradient(135deg,${DK},#2a1500)`,borderRadius:12,padding:14,marginBottom:14}}><div style={{color:"rgba(255,255,255,0.5)",fontSize:10,fontWeight:700,marginBottom:2}}>KLIENT · SLOT</div><div style={{color:"white",fontWeight:900,fontSize:20}}>#{openSlot}</div>{autoLabel(openSlot)&&<div style={{color:OR,fontSize:12,fontWeight:600,marginTop:2}}>{autoLabel(openSlot)}</div>}<div style={{color:"rgba(255,255,255,0.5)",fontSize:11,marginTop:2}}>Max 4 soubory · 10 MB / soubor · uloženo lokálně</div></div><FileUploadBox idbKey={"slot_"+uid+"_"+openSlot} maxFiles={4} maxMB={10} accept="image/*,application/pdf" label="📤 Přidat soubor (PDF nebo obrázek, max 10 MB)" emptyText={"Zatím žádné soubory pro klienta #"+openSlot}/></div>)}
  </div>);
}

// ── NASTAVENÍ ─────────────────────────────────────────────────
function Nastaveni({me,users,upUsers}){
  const [op,setOp]=useState("");const [np,setNp]=useState("");const [cp,setCp]=useState("");const [msg,setMsg]=useState("");
  async function changePw(){setMsg("");const f=users.find(u=>u.id===me.id);if(!f||f.password!==op){setMsg("❌ Staré heslo není správné.");return;}if(np.length<4){setMsg("❌ Heslo musí mít alespoň 4 znaky.");return;}if(np!==cp){setMsg("❌ Hesla se neshodují.");return;}await upUsers(users.map(u=>u.id===me.id?{...u,password:np}:u));setMsg("✅ Heslo změněno.");setOp("");setNp("");setCp("");}
  return(<div style={{padding:"16px"}}><h2 style={{margin:"0 0 16px",fontSize:17,fontWeight:900,color:DK}}>⚙️ Nastavení</h2><div style={{background:"white",borderRadius:16,padding:15,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}><div style={{display:"flex",alignItems:"center",gap:11,marginBottom:16,paddingBottom:14,borderBottom:"1px solid #f5f5f5"}}><div style={{width:44,height:44,background:OR,borderRadius:11,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,color:"white",fontSize:19}}>{me.name[0]}</div><div><div style={{fontWeight:800,fontSize:15,color:DK}}>{me.name}</div><div style={{color:"#ccc",fontSize:11}}>Obchodní zástupce · Pro-Factor</div></div></div><h3 style={{margin:"0 0 12px",fontSize:13,color:DK}}>🔑 Změnit heslo</h3>{msg&&<div style={{padding:9,borderRadius:8,background:msg.startsWith("✅")?"#f0fdf4":"#fef2f2",color:msg.startsWith("✅")?GR:"#dc2626",fontSize:13,marginBottom:12}}>{msg}</div>}<div style={{marginBottom:11}}><label style={lbl}>Staré heslo</label><input type="password" style={inp} value={op} onChange={e=>setOp(e.target.value)}/></div><div style={{marginBottom:11}}><label style={lbl}>Nové heslo</label><input type="password" style={inp} value={np} onChange={e=>setNp(e.target.value)}/></div><div style={{marginBottom:14}}><label style={lbl}>Potvrzení</label><input type="password" style={inp} value={cp} onChange={e=>setCp(e.target.value)} onKeyDown={e=>e.key==="Enter"&&changePw()}/></div><button onClick={changePw} style={{width:"100%",padding:12,background:OR,color:"white",border:"none",borderRadius:11,fontWeight:700,fontSize:14,cursor:"pointer"}}>Uložit nové heslo</button></div></div>);
}

// ── ADMIN ─────────────────────────────────────────────────────
function Admin({users,cfg,upUsers,upCfg}){
  const [ac,setAc]=useState(cfg?.accessCode||DEF_CODE);const [ap,setAp]=useState(cfg?.adminPassword||DEF_APW);const [saved,setSaved]=useState(false);
  async function save(){await upCfg({...cfg,accessCode:ac,adminPassword:ap});setSaved(true);setTimeout(()=>setSaved(false),2500);}
  return(<div style={{padding:"16px"}}><h2 style={{margin:"0 0 16px",fontSize:17,fontWeight:900,color:DK}}>⚙️ Admin panel</h2><div style={{background:"white",borderRadius:16,padding:15,marginBottom:12,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}><h3 style={{margin:"0 0 12px",fontSize:13,color:DK}}>🔐 Přístupové nastavení</h3><div style={{marginBottom:11}}><label style={lbl}>Přístupový kód</label><input style={inp} value={ac} onChange={e=>setAc(e.target.value)}/></div><div style={{marginBottom:14}}><label style={lbl}>Admin heslo</label><input type="password" style={inp} value={ap} onChange={e=>setAp(e.target.value)}/></div><button onClick={save} style={{width:"100%",padding:11,background:saved?GR:OR,color:"white",border:"none",borderRadius:11,fontWeight:700,fontSize:14,cursor:"pointer"}}>{saved?"✅ Uloženo!":"Uložit nastavení"}</button></div><div style={{background:"white",borderRadius:16,padding:15,marginBottom:12,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}><h3 style={{margin:"0 0 12px",fontSize:13,color:DK}}>👥 Uživatelé ({users.length}/15)</h3>{users.length===0&&<div style={{color:"#ccc",textAlign:"center",padding:"18px 0",fontSize:13}}>Žádní uživatelé.</div>}{users.map(u=>(<div key={u.id} style={{display:"flex",alignItems:"center",gap:9,padding:"9px 0",borderBottom:"1px solid #f8f8f8"}}><div style={{width:32,height:32,background:OR,borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,color:"white",fontSize:14}}>{u.name[0]}</div><div style={{flex:1}}><div style={{fontWeight:600,color:DK,fontSize:13}}>{u.name}</div><div style={{fontSize:10,color:"#ccc"}}>{u.createdAt?new Date(u.createdAt).toLocaleDateString("cs"):"—"}</div></div><button onClick={async()=>{if(window.confirm("Smazat "+u.name+"?"))await upUsers(users.filter(x=>x.id!==u.id));}} style={{background:"#fef2f2",border:"none",color:"#dc2626",padding:"5px 8px",borderRadius:7,fontSize:12,cursor:"pointer"}}>🗑️</button></div>))}</div><div style={{background:"#fff8f0",borderRadius:11,padding:13,fontSize:12,color:"#aaa",lineHeight:1.7}}><strong style={{color:DK}}>ℹ️ Přidat obchodníka:</strong><br/>Sdílej přístupový kód. Obchodník se zaregistruje přes "Nový uživatel".</div></div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
